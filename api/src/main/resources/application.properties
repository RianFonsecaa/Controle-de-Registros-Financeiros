spring.application.name=controleDeRegistrosFinanceiros

spring.datasource.url=jdbc:mysql://db:3306/crf_bd?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration.access-minutes=15
api.security.token.expiration.refresh-hours=12

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
