<div class="flex flex-col gap-2">
  <label class="text-[13px] text-gray-600" htmlFor="cidade">Cidade</label>
  <select
    [compareWith]="compareById"
    [formControl]="control"
    id="cidade"
    class="select text-md h-12 w-full border border-gray-300 bg-white rounded-xl outline-0 text-gray-700"
  >
    <option [ngValue]="null" disabled class="text-gray-800 font-semibold">
      Selecione
    </option>
    @for (cidade of cidades(); track $index) {
      <option
        [ngValue]="cidade"
        class="text-gray-500 font-medium active:bg-blue-600 active:text-white hover:bg-gray-50"
      >
        {{ cidade.nome }}
      </option>
    }
  </select>

  @if (control.invalid && control.touched) {
    <small class="text-red-500">
      {{ getMensagemErro(control) }}
    </small>
  }
</div>
