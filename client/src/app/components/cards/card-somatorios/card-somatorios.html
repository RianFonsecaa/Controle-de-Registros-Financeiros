<div
  class="flex flex-row items-center gap-3 flex-1 w-full border border-gray-200 bg-white shadow-md p-6 rounded-3xl"
>
  <ng-content></ng-content>
  <div class="flex flex-col">
    <span class="text-[12px] font-bold text-gray-400">{{ label }}</span>

    <h1 [ngClass]="textColor" class="text-xl font-extrabold">
      @if (usarMoeda) {
        <span>
          {{ valor | currency: "BRL" : "symbol" : "1.2-2" : "pt-BR" }}
        </span>
      } @else {
        <span>{{ valor }}</span>
      }
    </h1>
  </div>
</div>
