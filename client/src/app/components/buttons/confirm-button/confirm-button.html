<button
  class="w-full rounded-xl text-white font-semibold text-sm p-3 transition-all duration-200 cursor-pointer transform active:scale-90"
  [ngClass]="{
    'bg-blue-600 hover:bg-blue-700': colorTheme === 'blue',
    'bg-green-600 hover:bg-green-700': colorTheme === 'green',
    'bg-red-600 hover:bg-red-700': colorTheme === 'red',
  }"
  (click)="confirmar.emit()"
>
  Sim, confirmar
</button>
