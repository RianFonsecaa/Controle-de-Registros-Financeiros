<div
  class="flex flex-col h-[450px] items-center justify-between bg-white shadow-sm p-4 rounded-3xl"
>
  <div class="flex flex-row items-center w-full gap-2">
    <svg
      class="w-4 h-4 text-[#008FFB]"
      viewBox="0 0 18 18"
      version="1.1"
      xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      fill="currentColor"
    >
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g
        id="SVGRepo_tracerCarrier"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></g>
      <g id="SVGRepo_iconCarrier">
        <title>chart_fill [#1292]</title>
        <desc>Created with Sketch.</desc>
        <defs></defs>
        <g
          id="Page-1"
          stroke="none"
          stroke-width="1"
          fill="none"
          fill-rule="evenodd"
        >
          <g
            id="Dribbble-Light-Preview"
            transform="translate(-61.000000, -2440.000000)"
            fill="currentColor"
          >
            <g id="icons" transform="translate(56.000000, 160.000000)">
              <path
                d="M17.0081791,2288 L23,2288 C23,2283.582 18.9615127,2280 14.9669654,2280 L14.9669654,2286 C14.9669654,2287.105 15.9046854,2288 17.0081791,2288 M15.0109054,2290 L21.0027264,2290 C21.0027264,2294.943 16.5148525,2298.839 11.3998347,2297.844 C8.28508644,2297.238 5.76352847,2294.724 5.15835455,2291.605 C4.16471092,2286.483 7.97650766,2282 12.9696918,2282 L12.9696918,2288 C12.9696918,2289.105 13.9074117,2290 15.0109054,2290"
                id="chart_fill-[#1292]"
              ></path>
            </g>
          </g>
        </g>
      </g>
    </svg>

    <h1 class="text-[#363636] text-[12px] font-extrabold tracking-wider">
      DISTRIBUIÇÃO POR MÉTODO DE PAGAMENTO
    </h1>
  </div>
  <div id="chartflex flex-col h-full flex-1">
    @if (chartOptions && chartOptions.series) {
      <apx-chart
        [series]="chartOptions.series"
        [chart]="chartOptions.chart"
        [labels]="chartOptions.labels"
        [responsive]="chartOptions.responsive"
        [legend]="chartOptions.legend"
      ></apx-chart>
    } @else {
      <div
        class="flex h-[450px] items-center justify-center bg-slate-50 rounded-xl border-2 border-dashed border-slate-200"
      >
        <p class="text-slate-400 font-medium">Aguardando dados da semana...</p>
      </div>
    }
  </div>
</div>
