<div class="modal-box flex flex-row min-w-[500px] gap-4 rounded-xl">
  <section
    class="flex flex-col w-full h-full justify-between gap-6"
    tabindex="-1"
  >
    <div class="flex flex-row items-center gap-2">
      <div
        class="flex justify-center items-center p-2 rounded-full bg-blue-100"
      >
        <svg
          class="w-5 h-5 text-blue-500"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"
          />
        </svg>
      </div>

      <h1 class="text-[16px] text-blue-500 font-semibold">
        {{ veiculo ? "Editar" : "Novo" }} Cadastro de Veículo
      </h1>
    </div>

    <form [formGroup]="veiculoForm" class="flex flex-col gap-4">
      <app-primary-input
        class="w-full"
        [control]="getControl('modelo')"
        placeholder="Ex: Palio Weekend"
        id="modelo"
        type="text"
        label="Modelo"
      ></app-primary-input>

      <app-primary-input
        class="w-full"
        [control]="getControl('placa')"
        mask="AAA 0A00"
        placeholder="AAA 0A00"
        id="placa"
        type="text"
        label="Placa"
      ></app-primary-input>
    </form>

    <div class="flex flex-row gap-2 justify-start w-full">
      <app-cancel-button
        class="w-full"
        (cancelar)="onCancelar()"
      ></app-cancel-button>

      <app-save-button class="w-full" (salvar)="onSalvar()"></app-save-button>
    </div>
  </section>
</div>
