<div
  [formGroup]="form"
  class="flex flex-row rounded-2xl border border-gray-200"
>
  <label
    class="flex items-center rounded-l-xl text-[13px] font-semibold text-[#94A3B8] bg-[#eff3f8] p-2"
    >Registrante</label
  >

  <div class="flex flex-row p-1">
    <select
      (change)="onPreencherValor()"
      formControlName="registranteFiltro"
      [compareWith]="compareByLogin"
      class="select select-ghost border-0 text-md rounded-xl outline-0 font-medium text-[#94A3B8] bg-[#f2f6fc]"
    >
      <option [ngValue]="null" disabled>Selecione</option>

      @for (usuario of usuarioService.usuariosAtivos(); track $index) {
        <option
          class="text-gray-500 font-medium active:bg-blue-600 active:text-white"
          [ngValue]="usuario"
        >
          {{ usuario.name }}
        </option>
      }
    </select>

    <button
      (click)="onRemover()"
      class="flex items-center px-3 cursor-pointer group"
    >
      <svg
        class="w-5 h-5 text-[#94A3B8] transition-colors duration-200 group-hover:text-red-500"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        viewBox="0 0 24 24"
      >
        <path
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18 17.94 6M18 18 6.06 6"
        />
      </svg>
    </button>
  </div>
</div>
