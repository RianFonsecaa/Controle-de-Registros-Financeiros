spring.application.name=controleDeRegistrosFinanceiros

spring.datasource.url = jdbc:mysql://localhost:3306/crf_bd
spring.datasource.username = root
spring.datasource.password = 123456
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration.access-minutes=60
api.security.token.expiration.refresh-hours=1

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB