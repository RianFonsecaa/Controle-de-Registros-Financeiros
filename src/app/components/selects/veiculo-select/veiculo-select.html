<div class="flex flex-col gap-2">
  <label class="text-[13px] text-gray-600" htmlFor="veiculo">Veículo</label>
  <select
    [compareWith]="compareById"
    [formControl]="control"
    id="veiculo"
    class="select select-ghost text-md h-12 w-full border border-gray-300 rounded-xl outline-0 text-gray-700"
  >
    <option [ngValue]="null" disabled class="text-gray-800 font-semibold">
      Selecione
    </option>
    @for (veiculo of veiculos(); track $index) {
      <option
        [ngValue]="veiculo"
        class="text-gray-500 font-medium active:bg-blue-600 active:text-white"
      >
        {{ veiculo.modelo }}
      </option>
    }
  </select>

  @if (control.invalid && control.touched) {
    <small class="text-red-500">
      {{ getMensagemErro(control) }}
    </small>
  }
</div>
