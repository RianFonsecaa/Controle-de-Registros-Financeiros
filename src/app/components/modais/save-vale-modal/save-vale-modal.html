<div
  class="modal-box max-w-none w-auto flex flex-col gap-4 rounded-xl"
  tabindex="-1"
>
  <h1 class="text-xl font-semibold">Novo Registro de Pix</h1>

  <form class="flex flex-col flex-1 gap-4" [formGroup]="valeForm">
    <app-primary-select
      class="w-full"
      id="funcionario"
      [options]="funcionarioService.funcionarios()"
      [control]="getControl('funcionario')"
      label="Funcionarios"
    ></app-primary-select>

    <div class="flex flex-row gap-4">
      <app-money-input
        class="w-[50%]"
        id="valor"
        [control]="getControl('valor')"
        placeholder="R$ 0,00"
        label="Valor"
      ></app-money-input>

      <app-primary-input
        class="w-[50%]"
        id="data"
        label="Data"
        type="date"
        [control]="getControl('data')"
      ></app-primary-input>
    </div>

    <textarea
      [formControl]="getControl('justificativa')"
      id="observacoes"
      rows="4"
      placeholder="Digite as observações..."
      class="w-full p-4 border border-gray-300 rounded-xl outline-0 text-md text-gray-700 placeholder:text-[#c2c2c2]"
    ></textarea>
    @if (getControl('justificativa').invalid &&
    getControl('justificativa').touched){
    <small class="text-red-500"> Este campo é obrigatório! </small>
    }
  </form>

  <div class="flex flex-row gap-2 justify-start w-full">
    <app-cancel-button
      class="w-full"
      (cancelar)="onCancelar()"
    ></app-cancel-button>

    <app-save-button class="w-full" (salvar)="onSalvar()"></app-save-button>
  </div>
</div>
