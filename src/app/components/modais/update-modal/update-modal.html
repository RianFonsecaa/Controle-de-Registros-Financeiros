<div
  class="modal-box flex flex-row min-w-[500px] min-h-[700px] gap-4 rounded-xl"
>
  <section
    class="flex flex-col w-full h-full justify-between gap-6"
    tabindex="-1"
  >
    <div class="flex flex-row items-center gap-2">
      <div
        class="flex justify-center items-center p-2 rounded-full bg-blue-100"
      >
        <svg
          class="w-5 h-5 text-blue-500"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 52 52"
          enable-background="new 0 0 52 52"
          xml:space="preserve"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M41.4,39.7l-0.9,0.9c-1,1-2.3,1.5-3.7,1.5h-2.6c-2.4,0-5-1.9-5-5.2v-2.5c0-2,0.9-3.2,1.4-3.9l10.8-11 c0.3-0.3,0.6-1,0.6-1.4V9.8C42,7.2,39.8,5,37.2,5H11.6C9,5,6.8,7.4,6.8,9.8H5.2C3.4,9.8,2,11.3,2,13.1s1.4,3.2,3.2,3.2h1.6v6.5H5.2 C3.4,22.8,2,24.2,2,26s1.4,3.2,3.2,3.2h1.6v6.5H5.2c-1.8,0-3.2,1.5-3.2,3.2c0,1.8,1.4,3.2,3.2,3.2h1.6c0,3.2,2.2,4.8,4.8,4.8H30h7.2 c2.6,0,4.8-2.2,4.8-4.8V40C42,39.5,41.8,39.4,41.4,39.7z M33.2,17.1c0,0.9-0.7,1.6-1.6,1.6h-16c-0.9,0-1.6-0.7-1.6-1.6v-1.6 c0-0.9,0.7-1.6,1.6-1.6h16c0.9,0,1.6,0.7,1.6,1.6V17.1z M26,36.5c0,0.9-0.7,1.6-1.6,1.6h-8.8c-0.9,0-1.6-0.7-1.6-1.6v-1.6 c0-0.9,0.7-1.6,1.6-1.6h8.8c0.9,0,1.6,0.7,1.6,1.6V36.5z M28.4,26.8c0,0.9-0.7,1.6-1.6,1.6H15.6c-0.9,0-1.6-0.7-1.6-1.6v-1.6 c0-0.9,0.7-1.6,1.6-1.6h11.2c0.9,0,1.6,0.7,1.6,1.6V26.8z"
            ></path>
            <path
              d="M49.5,22.4l-1-1c-0.6-0.6-1.6-0.6-2.2,0L34.1,34C34,34,34,34.2,34,34.2v2.7c0,0.2,0,0.4,0.2,0.4h2.6 c0.1,0,0.2-0.1,0.3-0.1l12.3-12.4C50.2,24.1,50.2,23.1,49.5,22.4z"
            ></path>
          </g>
        </svg>
      </div>

      <h1 class="text-[16px] text-blue-500 font-semibold">
        Novo Registro de Cobrança
      </h1>
    </div>
    <form class="flex flex-col gap-4" [formGroup]="cobrancaForm">
      <div class="flex flex-row relative w-full gap-2">
        <app-cidade-select
          class="relative w-[60%]"
          [control]="getControl('cidade')"
        >
        </app-cidade-select>

        <app-primary-input
          class="relative w-[40%]"
          [control]="getControl('data')"
          placeholder="Data"
          id="data"
          type="date"
          label="Data"
        ></app-primary-input>
      </div>
      <div class="flex flex-row relative w-full gap-2">
        <app-cobrador-select
          class="relative w-[50%]"
          [control]="getControl('cobrador')"
        ></app-cobrador-select>

        <app-veiculo-select
          class="relative w-[50%]"
          [control]="getControl('veiculo')"
        >
        </app-veiculo-select>
      </div>

      <div class="flex flex-row relative w-full gap-1">
        <app-money-input
          id="valorEspecie"
          [control]="getControl('valorEspecie')"
          placeholder="R$ 0,00"
          label="Valor Espécie"
        ></app-money-input>

        <app-money-input
          id="valorPix"
          [control]="getControl('valorTotalPix')"
          placeholder="R$ 0,00"
          label="Valor Pix"
        ></app-money-input>

        <app-money-input
          id="valorVale"
          [control]="getControl('valorTotalVale')"
          placeholder="R$ 0,00"
          label="Valor Vales"
        ></app-money-input>
      </div>

      <div class="flex flex-col relative w-full gap-2">
        <label class="text-[13px] text-gray-600" for="observacoes"
          >Observações</label
        >
        <textarea
          id="observacoes"
          rows="4"
          placeholder="Digite as observações..."
          [formControl]="getControl('observacoes')"
          class="w-full p-4 border border-gray-300 rounded-xl outline-0 text-md text-gray-700 placeholder:text-[#c2c2c2]"
        ></textarea>
        @if (
          getControl("observacoes").invalid && getControl("observacoes").touched
        ) {
          <small class="text-red-500"> Este campo é obrigatório! </small>
        }
      </div>

      <div class="flex relative w-full">
        <app-money-input
          class="w-full"
          id="valorTotal"
          [readonly]="true"
          [control]="getControl('valorTotal')"
          placeholder="R$ 0,00"
          label="Valor Total"
        ></app-money-input>
      </div>
    </form>

    <div class="flex flex-row gap-2 justify-start w-full">
      <app-cancel-button
        class="w-full"
        (cancelar)="onCancelar()"
      ></app-cancel-button>
      <app-save-button class="w-full" (salvar)="onSalvar()"></app-save-button>
    </div>
  </section>
</div>
