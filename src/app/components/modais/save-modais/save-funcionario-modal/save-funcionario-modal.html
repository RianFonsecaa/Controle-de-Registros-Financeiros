<div class="modal-box flex flex-row min-w-[500px] gap-4 rounded-xl">
  <section
    class="flex flex-col w-full h-full justify-between gap-6"
    tabindex="-1"
  >
    <div class="flex flex-row items-center gap-2">
      <div
        class="flex justify-center items-center p-2 rounded-full bg-blue-100"
      >
        <svg
          class="w-5 h-5 text-blue-500"
          fill="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
          />
        </svg>
      </div>

      <h1 class="text-[16px] text-blue-500 font-semibold">
        {{ funcionario ? "Editar" : "Novo" }} Cadastro de Funcionário
      </h1>
    </div>

    <form [formGroup]="funcionarioForm" class="flex flex-col gap-4">
      <div class="flex flex-row gap-2">
        <app-primary-input
          class="w-1/2"
          [control]="getControl('nome')"
          placeholder="Nome Completo"
          id="nome"
          type="text"
          label="Nome"
        ></app-primary-input>

        <app-telefone-input class="w-1/2" [control]="getControl('telefone')">
        </app-telefone-input>
      </div>
      <div class="flex flex-row gap-2">
        <app-primary-input
          class="w-1/2"
          [control]="getControl('email')"
          placeholder="E-mail"
          id="email"
          type="email"
          label="E-mail"
        ></app-primary-input>

        <app-primary-input
          class="w-1/2"
          [control]="getControl('dataNascimento')"
          placeholder="Data de Nascimento"
          id="dataNascimento"
          type="date"
          label="Data de Nascimento"
        ></app-primary-input>
      </div>
    </form>

    <div class="flex flex-row gap-2 justify-start w-full">
      <app-cancel-button
        class="w-full"
        (cancelar)="cancelar.emit()"
      ></app-cancel-button>

      <app-save-button class="w-full" (salvar)="onSalvar()"></app-save-button>
    </div>
  </section>
</div>
