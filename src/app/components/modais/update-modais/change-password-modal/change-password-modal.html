<div
  class="modal-box flex flex-row min-w-[450px] gap-4 rounded-xl bg-white p-6"
>
  <section
    class="flex flex-col w-full h-full justify-between gap-6 text-gray-700"
  >
    <div class="flex flex-row items-center gap-2">
      <div
        class="flex justify-center items-center p-2 rounded-full bg-amber-100"
      >
        <svg
          class="text-amber-500 w-6 h-6"
          fill="currentColor"
          viewBox="-7.5 0 32 32"
          version="1.1"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <title>lock</title>
            <path
              d="M14.625 15.156h2.094c0.281 0 0.5 0.25 0.5 0.531v11c0 0.281-0.219 0.5-0.5 0.5h-16.219c-0.281 0-0.5-0.219-0.5-0.5v-11c0-0.281 0.219-0.531 0.5-0.531h2.031v-5.125c0-2.875 1.844-5.25 4.688-5.25h2.688c2.875 0 4.719 2.375 4.719 5.25v5.125zM5.188 15.156h6.813v-4.875c0-1.594-1.313-2.938-2.938-2.938h-0.969c-1.594 0-2.906 1.344-2.906 2.938v4.875zM7.156 24h2.906l-0.719-3.156c0.5-0.25 0.844-0.781 0.844-1.375 0-0.906-0.719-1.594-1.594-1.594s-1.563 0.688-1.563 1.594c0 0.594 0.344 1.125 0.844 1.375z"
            ></path>
          </g>
        </svg>
      </div>
      <div class="flex flex-col">
        <h1 class="text-[16px] text-amber-600 font-semibold">Alterar Senha</h1>
        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">
          Usuário: {{ usuario?.name }}
        </p>
      </div>
    </div>

    <div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-md">
      <p class="text-[11px] text-amber-800">
        A nova senha deve conter no mínimo <strong>6 caracteres</strong>.
        Certifique-se de que o usuário seja informado sobre a alteração.
      </p>
    </div>

    <form [formGroup]="passwordForm" class="flex flex-col gap-4">
      <app-primary-input
        class="w-full"
        [control]="getControl('password')"
        placeholder="Digite a nova senha"
        label="Nova Senha"
        type="password"
      ></app-primary-input>

      <app-primary-input
        class="w-full"
        [control]="getControl('confirmPassword')"
        placeholder="Repita a nova senha"
        label="Confirmar Senha"
        type="password"
      ></app-primary-input>

      @if (
        passwordForm.hasError("mismatch") &&
        passwordForm.get("confirmPassword")?.touched
      ) {
        <span class="text-red-500 text-[10px] font-bold italic animate-pulse">
          * As senhas digitadas não coincidem.
        </span>
      }
    </form>

    <div class="flex flex-row gap-2 justify-start w-full pt-2">
      <app-cancel-button
        class="w-1/2"
        (cancelar)="cancelar.emit()"
      ></app-cancel-button>

      <app-save-button
        class="w-1/2"
        label="ALTERAR"
        [loading]="enviando"
        [disabled]="passwordForm.invalid"
        (salvar)="onConfirmar()"
        variante="amber"
      >
      </app-save-button>
    </div>
  </section>
</div>
