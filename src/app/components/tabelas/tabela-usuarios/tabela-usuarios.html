<section class="flex flex-col h-full gap-4 min-w-0">
  <div
    class="flex flex-col w-full h-full gap-2 min-w-0 rounded-3xl border border-gray-300 shadow-lg overflow-hidden bg-white"
  >
    <div class="flex flex-row min-w-0 justify-between p-6 items-center">
      <span
        class="flex flex-row items-center justify-center gap-2 font-extrabold text-[#475569]"
        ><div class="rounded-full bg-[#23C78D] h-2 w-2"></div>
        <span> LISTAGEM DE USUARIOS</span>
        <div class="flex flex-row items-center gap-2 font-semibold text-sm p-3">
          <input
            type="checkbox"
            [checked]="mostrarAtivos()"
            (change)="toggleStatusLista()"
            [ngClass]="{
              'border-[#23C78D] text-[#23C78D]': mostrarAtivos(),
              'border-gray-400 text-gray-400': !mostrarAtivos(),
            }"
            class="toggle border-2"
          />

          @if (mostrarAtivos()) {
            <span class="text-[#23C78D] font-bold">Ativos</span>
          } @else {
            <span class="text-gray-400">Inativos</span>
          }
        </div>
      </span>
      <div class="flex items-end min-w-0">
        <app-primary-add-button
          (abrir)="abrirModal(null, saveUserModal)"
          nome="Usuário"
        ></app-primary-add-button>
      </div>
    </div>

    @if (listaExibida().length > 0) {
      <div class="relative w-full h-full overflow-auto">
        <table class="w-full text-[12px] text-[#636363]">
          <thead>
            <tr class="bg-gray-50">
              <th class="sticky top-0 bg-gray-50 w-[12%] px-6 py-3 text-left">
                AÇÕES
              </th>
              <th class="sticky top-0 bg-gray-50 px-2 py-3 text-left">NOME</th>
              <th class="sticky top-0 bg-gray-50 px-2 py-3 text-left">
                E-MAIL (LOGIN)
              </th>
              <th class="sticky top-0 bg-gray-50 px-2 py-3 text-left">ROLE</th>
            </tr>
          </thead>

          <tbody>
            @for (user of listaExibida(); track user.login) {
              <tr
                class="border-t h-16 border-gray-200 hover:bg-gray-50 transition-colors"
              >
                <td class="py-2 px-6">
                  <div class="flex flex-row gap-2">
                    <button
                      (click)="abrirModal(user, saveUserModal)"
                      class="flex justify-center items-center rounded-md p-0 h-6 w-6 bg-blue-500 cursor-pointer shadow-md transition duration-200 hover:scale-110"
                      title="Editar Usuário"
                    >
                      <svg
                        class="text-white w-4 h-4"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g
                          id="SVGRepo_tracerCarrier"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        ></g>
                        <g id="SVGRepo_iconCarrier">
                          <path
                            d="M11.4001 18.1612L11.4001 18.1612L18.796 10.7653C17.7894 10.3464 16.5972 9.6582 15.4697 8.53068C14.342 7.40298 13.6537 6.21058 13.2348 5.2039L5.83882 12.5999L5.83879 12.5999C5.26166 13.1771 4.97307 13.4657 4.7249 13.7838C4.43213 14.1592 4.18114 14.5653 3.97634 14.995C3.80273 15.3593 3.67368 15.7465 3.41556 16.5208L2.05445 20.6042C1.92743 20.9852 2.0266 21.4053 2.31063 21.6894C2.59466 21.9734 3.01478 22.0726 3.39584 21.9456L7.47918 20.5844C8.25351 20.3263 8.6407 20.1973 9.00498 20.0237C9.43469 19.8189 9.84082 19.5679 10.2162 19.2751C10.5343 19.0269 10.823 18.7383 11.4001 18.1612Z"
                            fill="currentColor"
                          ></path>
                          <path
                            d="M20.8482 8.71306C22.3839 7.17735 22.3839 4.68748 20.8482 3.15178C19.3125 1.61607 16.8226 1.61607 15.2869 3.15178L14.3999 4.03882C14.4121 4.0755 14.4246 4.11268 14.4377 4.15035C14.7628 5.0875 15.3763 6.31601 16.5303 7.47002C17.6843 8.62403 18.9128 9.23749 19.85 9.56262C19.8875 9.57563 19.9245 9.58817 19.961 9.60026L20.8482 8.71306Z"
                            fill="currentColor"
                          ></path>
                        </g>
                      </svg>
                    </button>

                    <button
                      (click)="abrirModal(user, changePasswordModal)"
                      class="flex justify-center items-center rounded-md p-0 h-6 w-6 bg-amber-500 cursor-pointer shadow-md transition duration-200 hover:scale-110"
                      title="Alterar Senha"
                    >
                      <svg
                        class="text-white w-6 h-6"
                        fill="currentColor"
                        viewBox="-7.5 0 32 32"
                        version="1.1"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g
                          id="SVGRepo_tracerCarrier"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        ></g>
                        <g id="SVGRepo_iconCarrier">
                          <title>lock</title>
                          <path
                            d="M14.625 15.156h2.094c0.281 0 0.5 0.25 0.5 0.531v11c0 0.281-0.219 0.5-0.5 0.5h-16.219c-0.281 0-0.5-0.219-0.5-0.5v-11c0-0.281 0.219-0.531 0.5-0.531h2.031v-5.125c0-2.875 1.844-5.25 4.688-5.25h2.688c2.875 0 4.719 2.375 4.719 5.25v5.125zM5.188 15.156h6.813v-4.875c0-1.594-1.313-2.938-2.938-2.938h-0.969c-1.594 0-2.906 1.344-2.906 2.938v4.875zM7.156 24h2.906l-0.719-3.156c0.5-0.25 0.844-0.781 0.844-1.375 0-0.906-0.719-1.594-1.594-1.594s-1.563 0.688-1.563 1.594c0 0.594 0.344 1.125 0.844 1.375z"
                          ></path>
                        </g>
                      </svg>
                    </button>

                    <button
                      (click)="abrirModal(user, toggleStatusModal)"
                      class="flex justify-center items-center rounded-md p-0 h-6 w-6 bg-red-500 cursor-pointer shadow-md transition duration-200 hover:scale-110"
                      title="Excluir Usuário"
                    >
                      <svg
                        class="text-white w-4 h-4"
                        version="1.1"
                        id="_x32_"
                        xmlns="http://www.w3.org/2000/svg"
                        xmlns:xlink="http://www.w3.org/1999/xlink"
                        viewBox="0 0 512 512"
                        xml:space="preserve"
                        fill="currentColor"
                      >
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g
                          id="SVGRepo_tracerCarrier"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        ></g>
                        <g id="SVGRepo_iconCarrier">
                          <g>
                            <path
                              class="st0"
                              d="M423.262,91.992c-16.877-15.91-43.434-15.098-59.32,1.778c-15.894,16.877-15.098,43.434,1.779,59.32 c32.082,30.213,49.754,71.238,49.754,115.5c0,87.934-71.541,159.476-159.476,159.476S96.525,356.524,96.525,268.59 c0-44.262,17.668-85.287,49.754-115.5c16.877-15.885,17.672-42.442,1.779-59.32c-15.885-16.885-42.455-17.688-59.32-1.778 C40.344,137.557,12.59,201.926,12.59,268.59C12.59,402.803,121.783,512,256,512c134.213,0,243.41-109.197,243.41-243.41 C499.41,201.926,471.656,137.557,423.262,91.992z"
                            ></path>
                            <path
                              class="st0"
                              d="M256,268.59c23.178,0,41.967-15.033,41.967-33.574V33.574C297.967,15.033,279.178,0,256,0 c-23.178,0-41.967,15.033-41.967,33.574v201.443C214.033,253.557,232.822,268.59,256,268.59z"
                            ></path>
                          </g>
                        </g>
                      </svg>
                    </button>
                  </div>
                </td>
                <td class="p-2 font-semibold text-gray-700">{{ user.name }}</td>
                <td class="p-2 italic">{{ user.login }}</td>
                <td class="p-2 font-bold">{{ user.role }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <div
        class="flex flex-col gap-2 h-full items-center justify-center p-12 text-center"
      >
        <div class="bg-blue-50 p-4 rounded-full text-blue-400">
          <i class="fa-solid fa-users-slash text-4xl"></i>
        </div>
        <h3 class="text-xl font-bold text-[#475569]">Nenhum usuário</h3>
      </div>
    }
  </div>
</section>

<dialog #saveUserModal class="modal">
  <app-save-user-modal
    [usuario]="usuarioSelecionado"
    (salvar)="fecharModal(saveUserModal)"
    (cancelar)="fecharModal(saveUserModal)"
  ></app-save-user-modal>
</dialog>

<dialog #toggleStatusModal class="modal">
  <app-toggle-status-modal
    (confirmar)="toggleStatusUsuario(toggleStatusModal)"
    (cancelar)="fecharModal(toggleStatusModal)"
    tipoCadastro="Cidade"
    [toggleStatus]="mostrarAtivos()"
  ></app-toggle-status-modal>
</dialog>

<dialog #changePasswordModal class="modal">
  <app-change-password-modal
    [usuario]="usuarioSelecionado"
    (confirmar)="fecharModal(changePasswordModal)"
    (cancelar)="fecharModal(changePasswordModal)"
  ></app-change-password-modal>
</dialog>
